services:
  api:
    ports:
      # Exposes application port.
    - "8000:8000"
    build: &build
      context: .
      dockerfile: ./Dockerfile
      target: dev
    volumes:
      # Adds current directory as volume.
    - .:/app/src/
    environment:
      # Enables autoreload.
      {{cookiecutter.project_name | upper}}_RELOAD: "True"
    develop:
      watch:
        - action: rebuild
          path: uv.lock

  {%- if cookiecutter.enable_taskiq == "True" %}

  taskiq-worker:
    build:
      <<: *build
    volumes:
      # Adds current directory as volume.
      - .:/app/src/
    command:
      - taskiq
      - worker
      - {{cookiecutter.project_name}}.tkq:broker
      - --reload
  {%- endif %}
